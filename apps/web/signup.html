<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/favicon.svg" type="image/svg+xml"><title>Start Permitly</title><link rel="stylesheet" href="styles.css"></head><body class="auth-body"><main class="auth-shell"><a class="brand auth-brand" href="/"><img src="brand-mark.svg">Permitly</a><section class="auth-card"><div class="auth-tabs"><button class="active" data-auth-tab="register">Create workspace</button><button data-auth-tab="login">Sign in</button></div><div id="registerPane"><div class="tag">Start your control plane</div><h1>Create your workspace</h1><p class="muted">Set up your organization, owner account and isolated production workspace.</p><form id="registerForm" class="auth-form"><input id="regOrg" placeholder="Organization name" required><input id="regName" placeholder="Your name" required><input id="regEmail" type="email" placeholder="Work email" required><input id="regPassword" type="password" minlength="12" placeholder="Password — 12+ characters" required><button class="btn lime">Create free workspace</button></form></div><div id="loginPane" hidden><div class="tag">Welcome back</div><h1>Sign in</h1><p class="muted">Access policies, approvals, billing and audit evidence.</p><form id="loginForm" class="auth-form"><input id="loginEmail" type="email" placeholder="Work email" required><input id="loginPassword" type="password" placeholder="Password" required><button class="btn lime">Sign in</button></form></div><div id="authMessage" class="auth-message"></div></section><p class="auth-note">By continuing, you agree to the Terms and Privacy Policy.</p></main><script src="account.js"></script></body></html>
